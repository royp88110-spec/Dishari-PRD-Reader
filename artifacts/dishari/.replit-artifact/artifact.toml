kind = "mobile"
previewPath = "/"
title = "Dishari Mess"
version = "1.0.0"
id = "artifacts/dishari"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18269

[services.development]
run = "pnpm --filter @workspace/dishari run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dishari", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dishari", "run", "serve" ]

[services.env]
PORT = "18269"
BASE_PATH = "/"
